<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qlick – DoriDoori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: #faf7f2;
      font-family: 'DM Mono', monospace;
      color: #1a1a18;
    }

    :root {
      --cream: #f0ebe0;
      --bg: #faf7f2;
      --ink: #1a1a18;
      --ink-soft: #3a3a36;
      --ink-muted: #7a7a72;
    }

    /* Nav */
    .vc-nav {
      padding: 26px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .vc-logo {
      font-family: 'Caveat', cursive;
      font-weight: 600;
      font-size: 22px;
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }
    .vc-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      background: rgba(26,26,24,0.07);
      padding: 6px 14px;
      border-radius: 20px;
    }

    /* Hero */
    .vc-hero {
      text-align: center;
      border-bottom: 1px solid rgba(26,26,24,0.09);
    }
    .vc-img-wrap {
      width: 100%;
      max-height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    .vc-img {
      width: 100%;
      height: auto;
      max-height: 100vh;
      object-fit: contain;
      display: block;
    }
    .vc-hero-text {
      padding: 56px 52px 64px;
      text-align: center;
    }
    .vc-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 400;
      font-size: 50px;
      line-height: 0.9;
      color: var(--ink);
      margin-bottom: 22px;
    }
    .vc-sub {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.85;
      color: var(--ink-soft);
      max-width: 360px;
      margin: 0 auto 32px;
    }

    /* Switch profiles */
    .vc-sw-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin: 8px 0 18px;
    }
    .vc-pills {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .vc-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1.5px solid rgba(26,26,24,0.18);
      border-radius: 40px;
      padding: 9px 20px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: var(--ink-soft);
      cursor: default;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }
    .vc-pill:hover {
      border-color: var(--ink);
      background: rgba(26,26,24,0.04);
      color: var(--ink);
    }
    .vc-pill-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* CTA */
    .vc-cta-img {
      display: inline-block;
      transition: opacity 0.18s, transform 0.18s;
    }
    .vc-cta-img:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
    .vc-cta-img img {
      height: 56px;
      display: block;
    }
    .vc-footnote {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.85;
      color: var(--ink-soft);
      margin-top: 18px;
    }

    /* Footer */
    .vc-footer {
      border-top: 1px solid rgba(26,26,24,0.09);
      padding: 24px 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .vc-footer-l {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
    }
    .vc-footer-r {
      font-family: 'Caveat', cursive;
      font-weight: 600;
      font-size: 19px;
      color: var(--ink-soft);
    }

    /* Mobile */
    @media (max-width: 640px) {
      .vc-nav { padding: 20px 24px; }
      .vc-img-wrap { max-height: none; }
      .vc-img { max-height: none; }
      .vc-hero-text { padding: 40px 24px 48px; }
      .vc-title { font-size: 42px; }
      .vc-footer { padding: 20px 24px; }
    }
  </style>
</head>
<body>

  <nav class="vc-nav">
    <div class="vc-logo">DoriDoori</div>
    <div class="vc-badge">Open Testing</div>
  </nav>

  <section class="vc-hero">
    <div class="vc-img-wrap">
      <img class="vc-img" src="assets/header.jpg" alt="DoriDoori characters" />
    </div>
    <div class="vc-hero-text">
      <h1 class="vc-title"><span style="color:#7c6af7;">Ql</span><span style="color:#ff6eb4;">i</span><span style="color:#7c6af7;">ck</span></h1>
      <p class="vc-sub">
        Ever just need something to click?<br /><br />
        A mechanical keyboard fidget app.<br />
        Pick your switch, feel the haptics, and just... click.
      </p>

      <div class="vc-sw-label">6 Switch Profiles</div>
      <div class="vc-pills">
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#a78bca"></div>Clacky</div>
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#8b6c5c"></div>Thocky</div>
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#e8c97a"></div>Creamy</div>
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#aacad8"></div>Marbly</div>
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#d07070"></div>Clicky</div>
        <div class="vc-pill"><div class="vc-pill-dot" style="background:#b0b0a8"></div>Silent</div>
      </div>

      <a class="vc-cta-img" href="https://play.google.com/store/apps/details?id=com.qlick.app&hl=en-US" target="_blank" rel="noopener" aria-label="Get it on Google Play">
        <img alt="Get it on Google Play" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" />
      </a>
      <div class="vc-footnote">no ads · no sign-up · no nonsense</div>
    </div>
  </section>

  <footer class="vc-footer">
    <div class="vc-footer-l">
      DoriDooriBasco · 2026 · <a href="privacy.html" style="color:inherit;text-decoration:underline;text-decoration-color:rgba(122,122,114,0.4);text-underline-offset:3px;">Privacy Policy</a>
    </div>
    <div class="vc-footer-r">DoriDoori</div>
  </footer>

</body>
</html>
